name: 一時Playwright依存追加

on:
  push:
    branches:
      - feature/playwright-e2e

permissions:
  contents: write

jobs:
  add-dependency:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 対象ブランチを取得
        uses: actions/checkout@v7
        with:
          ref: feature/playwright-e2e

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.0

      - name: PlaywrightをdevDependencyへ追加
        working-directory: web
        run: npm install --save-dev @playwright/test --no-audit --no-fund

      - name: 生成差分を確認
        run: |
          git diff --check
          git diff -- web/package.json web/package-lock.json

      - name: 依存定義をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/package.json web/package-lock.json
          git commit -m "Playwright E2Eテスト依存を追加"
          git push origin HEAD:feature/playwright-e2e
