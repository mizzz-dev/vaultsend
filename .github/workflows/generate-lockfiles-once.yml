name: 一時依存ロック生成

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  generate:
    name: Go・npm依存ロックを生成
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v7

      - name: Goをセットアップ
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.0

      - name: Go依存関係を整理
        run: go mod tidy

      - name: npm lockfileを生成
        working-directory: web
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: 生成結果を検証
        shell: bash
        run: |
          test -s go.sum
          test -s web/package-lock.json
          go mod tidy
          git diff --exit-code -- go.mod go.sum
          cd web
          npm ci --ignore-scripts --no-audit --no-fund

      - name: 依存ロックファイルを保存
        uses: actions/upload-artifact@v7
        with:
          name: generated-dependency-locks-${{ github.run_id }}
          path: |
            go.mod
            go.sum
            web/package-lock.json
          if-no-files-found: error
          retention-days: 1
